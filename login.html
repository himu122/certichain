<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in | CertiChain</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Universal CSS -->
  <link rel="stylesheet" href="css/universal.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="images/logo header.png" alt="CertiChain logo">
    </a>
  </div>

  <nav>
    <a href="home.html">Home</a>
    <a href="blogs.html">Blogs</a>
    <a href="courses.html">Courses</a>
    <a href="about.html">About Us</a>
  </nav>

  <div class="nav-btns">
  <a href="login.html" class="nav-btn login">Log In</a>
  <a href="signup.html" class="nav-btn signup">Sign Up</a>
</div>
</header>

<!-- ================= PAGE HEADER ================= -->
<section class="page-hero">
  <h1>Log in</h1>
</section>

<!-- ================= SIGN IN ================= -->
<main class="login-page">
  <div class="login-box reveal-up">

    <h3>Sign In</h3>

    <input type="text" placeholder="User name">
    <input type="password" placeholder="Password">

    <button class="btn-primary">Sign in</button>

    <a href="#" class="link">Forgot Password?</a>

    <hr>

    <p class="muted">New User</p>
    <a href="signup.html" class="btn-secondary">Sign up</a>

  </div>
</main>

<!-- ================= NEWSLETTER ================= -->
<section class="newsletter reveal-up">
  <div class="news-left">
    <img src="images/letter image.svg" alt="Newsletter">
  </div>

  <div class="news-right">
    <h3>SUBSCRIBE TO OUR NEWSLETTER</h3>
    <div class="input-box">
      <input type="email" placeholder="Type your email here">
      <button>SUBSCRIBE</button>
    </div>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer reveal-up">
  <div class="footer-top">
    <div class="logo">
      <img src="images/logo footer.png" alt="CertiChain footer logo">
    </div>

    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="blogs.html">Blogs</a>
      <a href="contact.html">Contact Us</a>
      <a href="about.html">About Us</a>
      <a href="courses.html">Courses</a>
    </div>
  </div>

  <p>© 2026 CertiChain. All rights reserved.</p>
</footer>

<!-- Universal JS -->
<script src="js/universal.js"></script>

</body>
</html>
